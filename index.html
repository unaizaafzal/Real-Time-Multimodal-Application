<!DOCTYPE html>
<html>
<head>
    <title>Voice Assistant - AudioWorklet Capture</title>
</head>
<body>
    <h1>Voice Assistant</h1>
    <button id="startBtn">Start Recording</button>
    <button id="stopBtn" disabled>Stop Recording</button>
    <div id="transcript" style="margin-top: 20px; font-size: 18px;"></div>

    <script>
        let audioContext;
        let workletNode;
        let stream;
        let socket;

        const startBtn = document.getElementById("startBtn");
        const stopBtn = document.getElementById("stopBtn");
        const transcriptDiv = document.getElementById("transcript");

        startBtn.addEventListener("click", async () => {
            try {
                // Open WebSocket first
                socket = new WebSocket("ws://127.0.0.1:8000/ws/audio");
                socket.binaryType = "arraybuffer";

                socket.onopen = () => console.log("WebSocket opened.");
                socket.onmessage = (event) => console.log("Server:", event.data);
                socket.onerror = (err) => console.error("WebSocket error:", err);
                socket.onclose = () => console.log("WebSocket closed.");

                // Get mic access
                stream = await navigator.mediaDevices.getUserMedia({ audio: true });

                // AudioContext at 16kHz to match Deepgram's expected sample rate
                audioContext = new AudioContext({ sampleRate: 16000 });

                // Load the worklet processor from the separate file
                await audioContext.audioWorklet.addModule("audio_processor.js");

                const source = audioContext.createMediaStreamSource(stream);
                workletNode = new AudioWorkletNode(audioContext, "audio-processor");

                // Each time the worklet sends a PCM chunk, forward it over WebSocket
                workletNode.port.onmessage = (event) => {
                    if (socket.readyState === WebSocket.OPEN) {
                        socket.send(event.data); // raw Int16Array buffer
                        console.log("PCM chunk sent:", event.data.byteLength, "bytes");
                    }
                };

                source.connect(workletNode);
                workletNode.connect(audioContext.destination);

                console.log("Recording started (AudioWorklet, 16kHz PCM).");
                startBtn.disabled = true;
                stopBtn.disabled = false;

            } catch (err) {
                console.error("Error:", err);
            }
        });

        stopBtn.addEventListener("click", async () => {
            workletNode.disconnect();
            stream.getTracks().forEach(track => track.stop());
            await audioContext.close();
            socket.close();
            console.log("Recording stopped.");
            startBtn.disabled = false;
            stopBtn.disabled = true;
        });
    </script>
</body>
</html>
